name: "Build and Push"

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nanvix/toolchain-rust
  GCC_IMAGE: ghcr.io/nanvix/toolchain-gcc:latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build Toolchain Image"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: "Log in to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Pull GCC base image"
        run: docker pull ${{ env.GCC_IMAGE }}

      - name: "Extract metadata"
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: "Build image"
        run: |
          TAGS=""
          IFS=$'\n'
          for tag in ${{ steps.meta.outputs.tags }}; do
            TAGS="$TAGS -t $tag"
          done
          unset IFS
          docker build $TAGS .

      - name: "Push image"
        if: github.event_name != 'pull_request'
        run: |
          IFS=$'\n'
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker push "$tag"
          done
          unset IFS

  test:
    name: "Smoke Test"
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: "Log in to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Verify rustc version"
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            rustc --version

      - name: "Verify nanvix-x86 toolchain"
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            rustup +nanvix-x86 show
